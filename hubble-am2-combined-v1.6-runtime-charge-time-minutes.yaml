  # ------------------------------------------------------------
  # COMBINED BATTERY CALCULATION NOTES
  # ------------------------------------------------------------
  # Intended for parallel-connected packs.
  # Adds current, power and capacities.
  # Does NOT add voltages; combined pack voltage is averaged.

  # =========================
  # COMBINED BATTERY SENSOR DATA
  # =========================
      - timeout: ${live_data_timeout}
  - platform: template
    id: combined_total_detected_cell_count
    name: "combined total detected cell count"
    unit_of_measurement: "cells"
    state_class: measurement
    accuracy_decimals: 0
    update_interval: 30s
    filters:
      - timeout: ${live_data_timeout}
    lambda: |-
      float m = id(master_detected_cell_count).state;
      float s = id(slave_detected_cell_count).state;

      // Combined cell count must represent BOTH packs.
      // If either pack is stale/unavailable, publish NAN instead of a partial total.
      if (isnan(m) || isnan(s) || m <= 0 || s <= 0) return NAN;

      return m + s;

  - platform: template
    id: combined_total_current
    name: "combined total current"
    unit_of_measurement: "A"
    device_class: current
    state_class: measurement
    accuracy_decimals: 2
    update_interval: 30s
    filters:
      - timeout: ${live_data_timeout}
    lambda: |-
      float m = id(master_current).state;
      float s = id(slave_current).state;

      // Combined current must be the actual total of BOTH packs.
      // If either pack is stale/unavailable, do not show a partial value.
      if (isnan(m) || isnan(s)) return NAN;

      return m + s;

  - platform: template
    id: combined_total_power
    name: "combined total power"
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    accuracy_decimals: 1
    update_interval: 30s
    filters:
      - timeout: ${live_data_timeout}
    lambda: |-
      float m = id(master_power).state;
      float s = id(slave_power).state;

      // Combined power must be the actual total of BOTH packs.
      if (isnan(m) || isnan(s)) return NAN;

      return m + s;

  - platform: template
    id: combined_average_pack_voltage
    name: "combined average pack voltage"
    unit_of_measurement: "V"
    device_class: voltage
    state_class: measurement
    accuracy_decimals: 2
    update_interval: 30s
    filters:
      - timeout: ${live_data_timeout}
    lambda: |-
      float m = id(master_total_voltage).state;
      float s = id(slave_total_voltage).state;

      // Parallel packs: voltage is averaged, not added.
      // Require BOTH pack voltages so the displayed value is not hiding a failed pack.
      if (isnan(m) || isnan(s)) return NAN;

      return (m + s) / 2.0f;

  - platform: template
    id: combined_total_remaining_capacity
    name: "combined total remaining capacity"
    unit_of_measurement: "Ah"
    state_class: measurement
    accuracy_decimals: 2
