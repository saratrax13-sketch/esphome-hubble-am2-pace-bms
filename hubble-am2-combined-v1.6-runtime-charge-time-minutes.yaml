        id(slave_min_voltage_cell).publish_state(NAN);
        id(slave_max_voltage_cell).publish_state(NAN);
        return NAN;
      }

      id(slave_detected_cell_count).publish_state(valid_cells);
      id(slave_average_cell_voltage).publish_state(total_cell_voltage / valid_cells);
      id(slave_min_cell_voltage).publish_state(min_cell_voltage);
      id(slave_max_cell_voltage).publish_state(max_cell_voltage);
      id(slave_min_voltage_cell).publish_state(min_voltage_cell);
      id(slave_max_voltage_cell).publish_state(max_voltage_cell);

      return max_cell_voltage - min_cell_voltage;

