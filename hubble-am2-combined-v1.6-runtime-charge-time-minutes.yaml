# ============================================================
# NUMERIC SENSORS
# ============================================================
# This section exposes all numeric pack data:
# - Current, voltage, power, SOC, SOH, capacities and cycles
# - Warning/protection/status bitmasks
# - Cell voltages 1-16 for Master and Slave
# - Auto-detected cell count per pack
# - Calculated min/max/average/delta values
# - Combined battery totals
#
# IMPORTANT DATA-INTEGRITY RULE:
# Live numeric values use timeout filters. If the ESP32 stops receiving fresh
# valid Modbus data, Home Assistant will show unavailable rather than a stale
# last-good reading.

sensor:
  # =========================
  # MASTER PACK SENSOR DATA
  # =========================
  # ------------------------------------------------------------
  # MASTER PACK CORE ELECTRICAL SENSORS
  # ------------------------------------------------------------
  # Current and voltage are published from one batch Modbus read.
  # Power is calculated as current x voltage.

  - platform: template
    id: master_current
    name: "master current"
    update_interval: never
    unit_of_measurement: "A"
    device_class: current
    state_class: measurement
    accuracy_decimals: 2
    filters:
      - timeout: ${live_data_timeout}

  - platform: template
    id: master_total_voltage
    name: "master total voltage"
    update_interval: never
    unit_of_measurement: "V"
    device_class: voltage
    state_class: measurement
    accuracy_decimals: 2
    filters:
      - timeout: ${live_data_timeout}

  - platform: modbus_controller
    modbus_controller_id: bms_master
    id: master_power
    name: "master power"
    address: 0
    register_type: holding
    value_type: S_WORD
    register_count: 2
    response_size: 4
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    accuracy_decimals: 1
    filters:
      - timeout: ${live_data_timeout}
    lambda: |-
      if (data.size() < 4) return NAN;

      float current = (int16_t)((data[0] << 8) | data[1]) * 0.01f;
      float total_voltage = (uint16_t)((data[2] << 8) | data[3]) * 0.01f;

      // Hubble AM2 NMC 13-cell pack expected range. Keeps bad Modbus reads out of HA.
      if (total_voltage < 40.0f || total_voltage > 58.5f) {
        ESP_LOGW("bms", "master rejected invalid pack voltage: %.2f", total_voltage);
        return NAN;
      }

      id(master_current).publish_state(current);
      id(master_total_voltage).publish_state(total_voltage);

      return current * total_voltage;

  - platform: modbus_controller
    modbus_controller_id: bms_master
    id: master_state_of_charge
    name: "master state of charge"
    address: 2
    register_type: holding
    value_type: U_WORD
    unit_of_measurement: "%"
    device_class: battery
    state_class: measurement
    accuracy_decimals: 0
    filters:
      - timeout: ${live_data_timeout}

  - platform: modbus_controller
    modbus_controller_id: bms_master
    id: master_state_of_health
    name: "master state of health"
    address: 3
    register_type: holding
    value_type: U_WORD
    unit_of_measurement: "%"
    state_class: measurement
    accuracy_decimals: 0
    filters:
      - timeout: ${live_data_timeout}
    lambda: |-
      if (x < 0 || x > 100) return NAN;
      return x;

  - platform: modbus_controller
    modbus_controller_id: bms_master
    id: master_remaining_capacity
    name: "master remaining capacity"
    address: 4
    register_type: holding
    value_type: U_WORD
    unit_of_measurement: "Ah"
    state_class: measurement
    accuracy_decimals: 2
    filters:
      - multiply: 0.01

      - timeout: ${live_data_timeout}
  - platform: modbus_controller
    modbus_controller_id: bms_master
    id: master_full_capacity
    name: "master full capacity"
    skip_updates: 14
    address: 5
    register_type: holding
    value_type: U_WORD
    unit_of_measurement: "Ah"
    state_class: measurement
    accuracy_decimals: 2
    filters:
      - multiply: 0.01

      - timeout: ${static_data_timeout}
  - platform: modbus_controller
    modbus_controller_id: bms_master
    id: master_design_capacity
    name: "master design capacity"
    skip_updates: 14
    address: 6
    register_type: holding
    value_type: U_WORD
    unit_of_measurement: "Ah"
    state_class: measurement
    accuracy_decimals: 2
    filters:
      - multiply: 0.01

      - timeout: ${static_data_timeout}
  - platform: modbus_controller
    modbus_controller_id: bms_master
    id: master_charging_cycles
    name: "master charging cycles"
    skip_updates: 14
    address: 7
    register_type: holding
    value_type: U_WORD
    unit_of_measurement: "cycles"
    state_class: measurement
    accuracy_decimals: 0
    filters:
      - timeout: ${static_data_timeout}

  - platform: modbus_controller
    modbus_controller_id: bms_master
    id: master_warnings_bitmask
    name: "master warnings bitmask"
    address: 9
    register_type: holding
    value_type: U_WORD
    unit_of_measurement: ""
    state_class: measurement
    accuracy_decimals: 0
    filters:
      - timeout: ${live_data_timeout}

  - platform: modbus_controller
    modbus_controller_id: bms_master
    id: master_protections_bitmask
    name: "master protections bitmask"
    address: 10
    register_type: holding
    value_type: U_WORD
    unit_of_measurement: ""
    state_class: measurement
    accuracy_decimals: 0
    filters:
      - timeout: ${live_data_timeout}

  - platform: modbus_controller
    modbus_controller_id: bms_master
    id: master_fault_status_bitmask
    name: "master fault status bitmask"
    address: 11
    register_type: holding
    value_type: U_WORD
    unit_of_measurement: ""
    state_class: measurement
    accuracy_decimals: 0
    filters:
      - timeout: ${live_data_timeout}

  - platform: modbus_controller
    modbus_controller_id: bms_master
    id: master_balancer_status
    name: "master balancer status"
    address: 12
    register_type: holding
    value_type: U_WORD
    unit_of_measurement: ""
    state_class: measurement
    accuracy_decimals: 0

  # ------------------------------------------------------------
  # MASTER PACK CELL VOLTAGE SENSORS 1-16
  # ------------------------------------------------------------
  # These template sensors are published by the Master delta-cell batch read.
  # Unused/invalid cells publish NAN so Home Assistant shows them unavailable.
    filters:
      - timeout: ${live_data_timeout}

  - platform: template
    id: master_cell_voltage_1
    name: "master cell voltage 1"
    update_interval: never
    unit_of_measurement: "V"
    device_class: voltage
    state_class: measurement
    accuracy_decimals: 3
    filters:
      - timeout: ${live_data_timeout}

