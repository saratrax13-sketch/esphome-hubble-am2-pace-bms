  # =========================
  # SLAVE PACK SENSOR DATA
  # =========================
  # ------------------------------------------------------------
  # SLAVE PACK CORE ELECTRICAL SENSORS
  # ------------------------------------------------------------
  # Same logic as Master, but from Modbus address 0x02.

      - timeout: ${live_data_timeout}
  - platform: template
    id: slave_current
    name: "slave current"
    update_interval: never
    unit_of_measurement: "A"
    device_class: current
    state_class: measurement
    accuracy_decimals: 2
    filters:
      - timeout: ${live_data_timeout}

  - platform: template
    id: slave_total_voltage
    name: "slave total voltage"
    update_interval: never
    unit_of_measurement: "V"
    device_class: voltage
    state_class: measurement
    accuracy_decimals: 2
    filters:
      - timeout: ${live_data_timeout}

  - platform: modbus_controller
    modbus_controller_id: bms_slave
    id: slave_power
    name: "slave power"
    address: 0
    register_type: holding
    value_type: S_WORD
    register_count: 2
    response_size: 4
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    accuracy_decimals: 1
    filters:
      - timeout: ${live_data_timeout}
    lambda: |-
      if (data.size() < 4) return NAN;

      float current = (int16_t)((data[0] << 8) | data[1]) * 0.01f;
      float total_voltage = (uint16_t)((data[2] << 8) | data[3]) * 0.01f;

      // Hubble AM2 NMC 13-cell pack expected range. Keeps bad Modbus reads out of HA.
      if (total_voltage < 40.0f || total_voltage > 58.5f) {
        ESP_LOGW("bms", "slave rejected invalid pack voltage: %.2f", total_voltage);
        return NAN;
      }

      id(slave_current).publish_state(current);
      id(slave_total_voltage).publish_state(total_voltage);

      return current * total_voltage;

